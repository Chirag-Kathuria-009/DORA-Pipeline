# docker-compose.yml — DORA ICT Incident Intelligence Pipeline
# Full local stack: Zookeeper · Kafka · Kafka UI · MinIO · PostgreSQL · Airflow · Superset
# Usage:
#   cp .env.example .env          # fill in AIRFLOW_FERNET_KEY (see .env.example)
#   docker compose up -d
#   docker compose ps             # wait for all services healthy
#   python ingestion/kafka/topics_setup.py

# NOTE: version field is accepted by both Compose v1 and v2
version: "3.8"

# ── Shared Airflow config (YAML anchor — avoids repeating env + volumes) ──────
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.0
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Option B: install the Docker provider into the stock image at container start
    # (so the DAG's DockerOperator imports) without building a custom Airflow image.
    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-docker==3.9.1
    # Host absolute path to the repo. The DAG bind-mounts this into each runner
    # container; docker.sock mount sources resolve on the HOST, not in this container.
    DORA_HOST_PROJECT_ROOT: ${DORA_HOST_PROJECT_ROOT}
    # Forwarded by the DAG into runner containers (in-network creds for sync/dbt/GE).
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  volumes:
    - ./orchestration/dags:/opt/airflow/dags:ro
    - airflow-logs:/opt/airflow/logs
    # LocalExecutor runs tasks in the scheduler; it launches sibling runner
    # containers on the host Docker daemon via the mounted socket.
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - dora-net

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: dora-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - dora-net
    restart: unless-stopped

  # ── Kafka Broker ───────────────────────────────────────────────────────────
  # Two listeners:
  #   PLAINTEXT://kafka:29092    — container-to-container (e.g. Kafka UI, PySpark)
  #   PLAINTEXT_HOST://localhost:9092 — host machine scripts (simulator, topics_setup)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: dora-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      # Generous start_period + retries: on a cold boot the broker (JVM start +
      # replaying existing topic logs) can take >30s to answer the first probe,
      # which previously aborted dependents (kafka-ui) with "dependency failed to
      # start: container dora-kafka is unhealthy". start_period failures don't count
      # against retries, so this just widens the warmup window.
      retries: 10
      start_period: 90s
    networks:
      - dora-net
    restart: unless-stopped

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dora-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: dora-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - dora-net
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage for Iceberg) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: dora-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dora-net
    restart: unless-stopped

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  # Shared by: Airflow metadata and dbt target
  # Superset uses SQLite (see decisions.md)
  postgres:
    image: postgres:15
    container_name: dora-postgres
    ports:
      # Host port 5433 (NOT 5432) to avoid clashing with a PostgreSQL the developer
      # runs natively on 5432. The container-internal port is still 5432, so every
      # in-network service (Airflow via postgres:5432) is unaffected. Host-side
      # clients (dbt) must use localhost:5433. See decisions.md (2026-06-12 | infra).
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./storage/postgres_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dora-net
    restart: unless-stopped

  # ── Airflow Init (one-shot: DB migration + admin user creation) ────────────
  airflow-init:
    <<: *airflow-common
    container_name: dora-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@dora.local || true
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: dora-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8082:8080"
    command: webserver
    restart: unless-stopped

  # ── Airflow Scheduler ──────────────────────────────────────────────────────
  # LocalExecutor: the scheduler itself executes tasks in subprocesses.
  # No separate worker container is needed (that is CeleryExecutor only).
  airflow-scheduler:
    <<: *airflow-common
    container_name: dora-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped

  # ── Superset Init (one-shot: DB migration + admin user creation) ───────────
  # Superset metadata uses SQLite (see decisions.md) — no postgres dependency
  superset-init:
    image: dora/superset:latest
    container_name: dora-superset-init
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/superset_config.py
    volumes:
      - ./dashboard/superset_config.py:/app/superset_config.py:ro
      - superset-data:/app/superset_home
    command:
      - bash
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin \
          --username ${SUPERSET_ADMIN_USER} \
          --password ${SUPERSET_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --email admin@dora.local || true &&
        superset init
    networks:
      - dora-net
    restart: "no"

  # ── Superset ───────────────────────────────────────────────────────────────
  # Custom image (Dockerfile.superset) = stock apache/superset + psycopg2-binary,
  # so Superset can read the PostgreSQL dbt marts (Phase 7). See decisions.md.
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    image: dora/superset:latest
    container_name: dora-superset
    depends_on:
      superset-init:
        condition: service_completed_successfully
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/superset_config.py
    volumes:
      - ./dashboard/superset_config.py:/app/superset_config.py:ro
      - superset-data:/app/superset_home
    # -h 0.0.0.0 is REQUIRED: `superset run` (Flask dev server) defaults to binding
    # 127.0.0.1 INSIDE the container, so the 8088 port mapping reaches nothing and the
    # host browser gets ERR_EMPTY_RESPONSE. Binding 0.0.0.0 makes it reachable.
    command: superset run -h 0.0.0.0 -p 8088 --with-threads
    networks:
      - dora-net
    restart: unless-stopped

  # ── Pipeline runner (Phase 6, Option B) ─────────────────────────────────────
  # Image that every Airflow DockerOperator task runs in (pyiceberg/pandas/dbt/GE/
  # confluent-kafka). NOT started by `docker compose up` — the `tools` profile keeps
  # it build-only. Build it with:  docker compose build pipeline-runner
  pipeline-runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: dora/pipeline-runner:latest
    profiles:
      - tools
    networks:
      - dora-net

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  minio-data:
  postgres-data:
  airflow-logs:
  superset-data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  dora-net:
    # Fixed name (not the compose-prefixed default) so the DAG's DockerOperator
    # sibling containers can join it via network_mode: "dora-net".
    name: dora-net
    driver: bridge
